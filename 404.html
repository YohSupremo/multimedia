<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found | Multimedia Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
      /* ── Flash banner ── */
      .flash-banner {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        padding: 0.85rem 1.5rem;
        background: rgba(255, 92, 122, 0.12);
        border-bottom: 1px solid rgba(255, 92, 122, 0.35);
        font-size: 0.92rem;
        font-weight: 600;
        color: #ff5c7a;
        animation: flashIn 0.4s ease;
      }

      @keyframes flashIn {
        from { opacity: 0; transform: translateY(-12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .flash-icon { font-size: 1.1rem; }

      /* ── 404 page body ── */
      .not-found-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 6rem 2rem 3rem;
        gap: 1.2rem;
      }

      .nf-code {
        font-size: clamp(5rem, 18vw, 10rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #79a7ff 0%, #7ce0c3 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0;
        animation: fadeUp 0.6s ease;
      }

      .nf-title {
        font-size: clamp(1.2rem, 3vw, 1.7rem);
        font-weight: 700;
        color: var(--text);
        margin: 0;
        animation: fadeUp 0.7s ease;
      }

      .nf-desc {
        color: var(--muted);
        font-size: 0.97rem;
        max-width: 44ch;
        line-height: 1.7;
        margin: 0;
        animation: fadeUp 0.8s ease;
      }

      /* Countdown badge */
      .nf-countdown-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.88rem;
        color: var(--muted);
        animation: fadeUp 0.9s ease;
      }

      #nf-seconds {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: rgba(121, 167, 255, 0.12);
        border: 1px solid rgba(121, 167, 255, 0.3);
        font-weight: 700;
        font-size: 0.88rem;
        color: var(--accent-2);
        font-variant-numeric: tabular-nums;
        transition: transform 0.2s;
      }

      /* Progress bar */
      .nf-progress-track {
        width: min(320px, 80vw);
        height: 3px;
        background: var(--line);
        border-radius: 99px;
        overflow: hidden;
        animation: fadeUp 0.95s ease;
      }

      .nf-progress-bar {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, #79a7ff, #7ce0c3);
        border-radius: 99px;
        transform-origin: left;
        animation: shrink 5s linear forwards;
      }

      @keyframes shrink {
        from { transform: scaleX(1); }
        to   { transform: scaleX(0); }
      }

      /* Home button */
      .nf-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        background: var(--accent-2);
        color: #0a0c12;
        border: none;
        border-radius: var(--radius-md);
        padding: 0.65rem 1.6rem;
        font-size: 0.97rem;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        font-family: inherit;
        transition: opacity 0.15s, transform 0.12s;
        animation: fadeUp 1s ease;
      }

      .nf-btn:hover { opacity: 0.85; transform: translateY(-2px); }
      .nf-btn:active { transform: scale(0.97); }

      /* Wrong URL badge */
      .nf-path {
        font-size: 0.78rem;
        color: var(--muted);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: 0.3rem 0.8rem;
        font-family: monospace;
        max-width: 90vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        animation: fadeUp 0.85s ease;
      }
    </style>
  </head>
  <body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <!-- Flash banner -->
    <div class="flash-banner" id="flash-banner" role="alert">
      <span class="flash-icon">⚠️</span>
      <span>Page not found — redirecting you to the homepage…</span>
    </div>

    <!-- 404 content -->
    <div class="not-found-wrap">
      <p class="nf-code">404</p>
      <h1 class="nf-title">Oops! That page doesn't exist.</h1>
      <p class="nf-desc">
        The URL you entered doesn't match any page on this site.
        Check for typos, or head back home.
      </p>

      <!-- Wrong URL display -->
      <span class="nf-path" id="nf-path"></span>

      <!-- Countdown -->
      <div class="nf-countdown-wrap">
        <span>Redirecting in</span>
        <span id="nf-seconds">5</span>
        <span>seconds…</span>
      </div>

      <!-- Progress bar -->
      <div class="nf-progress-track">
        <div class="nf-progress-bar"></div>
      </div>

      <!-- Manual redirect -->
      <a class="nf-btn" href="index.html">⬅ Go to Homepage</a>
    </div>

    <script>
      // Show the current wrong URL
      const pathEl = document.getElementById('nf-path');
      pathEl.textContent = window.location.pathname || window.location.href;

      // Countdown and redirect
      let secs = 5;
      const secEl = document.getElementById('nf-seconds');

      const timer = setInterval(() => {
        secs--;
        secEl.textContent = secs;
        secEl.style.transform = 'scale(1.3)';
        setTimeout(() => { secEl.style.transform = 'scale(1)'; }, 150);

        if (secs <= 0) {
          clearInterval(timer);
          window.location.href = 'index.html';
        }
      }, 1000);
    </script>
  </body>
</html>
